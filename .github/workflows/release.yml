name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.format }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            format: dmg
            task: packageDmg
          - os: windows-latest
            format: msi
            task: packageMsi
          - os: ubuntu-latest
            format: deb
            task: packageDeb

    env:
      BASE_URL: ${{ secrets.BASE_URL }}
      BASE_URL_BUCKET: ${{ secrets.BASE_URL_BUCKET }}
      BASE_URL_BUCKET_PUBLIC: ${{ secrets.BASE_URL_BUCKET_PUBLIC }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build ${{ matrix.format }}
        run: ./gradlew clean ${{ matrix.task }} --no-configuration-cache

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: composeApp/build/compose/binaries/**/*.${{ matrix.format }}
          generate_release_notes: true
